name: sam
description: For IBM Z Open Editor 5.3.0 or newer. Wazi's code samples with COBOL, PL/I, and HLASM applications
version: 5.3.0
author:
  name: IBM CORPORATION

propertyGroups:
  - name: cobol-copybook
    language: cobol
    libraries:
      - name: syslib
        type: local
        locations:
          - "**/COPYBOOK"
          - "C:/Users/055988649/git/repository18/summer_zbuilder/copy" 
      - name: syslib
        type: mvs
        locations:
          - "${dbbHlq}.COPY"
      - name: MYLIB
        type: mvs
        locations:
          - "${dbbHlq}.COPY"
      - name: MYLIB
        type: local
        locations:
          - "**/COPYLIB-MVS"
      - name: MYFILE
        type: local
        locations:
          - "**/COPYLIB"

  - name: pl1-includes
    language: pl1
    compilerOptions: not(!)
    libraries:
      - name: syslib
        type: local
        locations:
          - "**/INCLUDES"
      - name: syslib
        type: mvs
        locations:
          - ${dbbHlq}.SAMPLE.PLINC
      - name: MYLIB
        type: mvs
        locations:
          - "${dbbHlq}.SAMPLE.PLI.INCLLIB"
      - name: MYLIB
        type: local
        locations:
          - "**/INCLUDELIB-MVS"
      - name: MYFILE
        type: local
        locations:
          - "**/INCLUDELIB"

  - name: hlasm-local
    language: hlasm
    libraries:
      - name: syslib
        type: local
        locations:
          - "**/ASMCOPY"

  - name: rexx-local
    language: rexx
    libraries:
    - name: syslib
      type: local
      locations:
        - "**/REXXINC"
    - name: REXXLIB
      type: local
      locations:
        - "**/REXXLIB"

  - name: jcl-includes
    language: jcl
    libraries:
    - name: jcllib
      type: local
      locations:
        - "JCLLIB"
    - name: jcllib
      type: mvs
    - name: proclib
      type: local
      locations:
        - "JCLPROC"
    - name: syslib
      type: mvs
      locations:
        - "SYS1.PROCLIB"

profiles:
  # User build profile example, requires IBM Dependency-Based Build
  - name: zbuilder
    type: dbb
    settings:
      command: "$DBB_HOME/bin/dbb -classpath /u/monaco/dbbv3.x_config build"
      lifecycle: user
      lifecycleArgs:
        - "--hlq ${dbbHlq}"
      additionalDependencies:
        - "dbb-app.yaml"
      logFilePatterns:
        - "/logs/*.log"
        - "/logs/BuildReport.*"
  